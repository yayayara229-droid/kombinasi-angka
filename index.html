<!DOCTYPE html>
<html>
<head>
  <title>10000 Kombinasi Literal</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .box { border: 1px solid #333; margin: 10px; padding: 10px; max-height: 400px; overflow-y: scroll; }
    .item { font-size: 12px; display: inline-block; width: 60px; }
  </style>
</head>
<body>

<h2>Masukkan jumlah bagian</h2>
<input id="num" type="number" min="1" max="26">
<button onclick="run()">Next</button>

<div id="result"></div>

<script>
function pad(num) {
  return String(num).padStart(4, "0");
}

function run() {
  let n = parseInt(document.getElementById("num").value);
  if (!n || n <= 0) return;

  let total = 10000;
  let chunk = Math.floor(total / n);
  let html = "";

  for (let i = 0; i < n; i++) {
    let start = i * chunk + 1;
    let end = (i + 1) * chunk;

    // terakhir bisa ambil sisa
    if (i === n-1) end = total;

    html += `<div class="box">
      <h3>Bagian ${String.fromCharCode(65 + i)}</h3>`;

    for (let j = start; j <= end; j++) {
      html += `<div class="item">${pad(j)}</div>`;
    }

    html += `</div>`;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
